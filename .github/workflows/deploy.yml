name: Sync to Server

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: tar --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='__pycache__' -czf deploy.tar.gz .

      - name: Display package info
        run: |
          echo "Package created:"
          tar -tzf deploy.tar.gz | head -20

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /opt/synergy-bot
            tar -xzf deploy.tar.gz
            npm install --production
            pm2 restart synergy-bot || pm2 start npm --name synergy-bot -- start

      - name: Notify Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          token: ${{ secrets.VERCEL_TOKEN }}
          deploymentId: ${{ secrets.VERCEL_DEPLOYMENT_ID }}
          status: ${{ job.status }}
